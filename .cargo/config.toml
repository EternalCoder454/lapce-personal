# Link runtime statically so Visual C++ Redist is not required.
# target-cpu=x86-64-v3 lets the compiler assume AVX2/FMA/BMI1+2 — a SIMD baseline
# supported by every Windows 11-capable CPU (Intel 8th-gen+/AMD Zen+). Portable
# across modern machines (not host-locked like target-cpu=native), so it stays
# future-proof while speeding up SIMD-heavy code (regex/search, memchr, rope).
[target.'cfg(all(windows, target_env = "msvc"))']
rustflags = ["-C", "target-feature=+crt-static", "-C", "target-cpu=x86-64-v3"]

[profile.ci]
inherits  = "dev"
opt-level = 0
debug     = false
