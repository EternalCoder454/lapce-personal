# Vendored into Lapce Personal from https://github.com/lapce/wasi-experimental-http
# (rev 21419eb785cb583ead180f25a9685fa16de7f326). Local changes vs upstream:
#   * src/lib.rs: `add_to_linker<T>` -> `add_to_linker<T: 'static>`.
#   * wasmtime: "*" -> "46" (pinned to the major we build against); dropped the
#     unused wasmtime-wasi / wasi-common deps. Ported to the wasmtime 46 API
#     alongside the host in lapce-proxy/src/plugin/wasi.rs.
[package]
    name        = "wasi-experimental-http-wasmtime"
    version     = "0.10.0"
    authors     = [ "Radu Matei <radu.matei@microsoft.com>" ]
    edition     = "2021"
    repository  = "https://github.com/deislabs/wasi-experimental-http"
    license     = "MIT"
    description = "Experimental HTTP library for WebAssembly in Wasmtime"
    readme      = "readme.md"

[dependencies]
    anyhow = "1.0"
    bytes = "1"
    futures = "0.3"
    http = "0.2"
    reqwest = { version = "0.11", default-features = true, features = [
        "json",
        "blocking",
    ] }
    thiserror = "1.0"
    tokio = { version = "1", features = [ "full" ] }
    tracing = { version = "0.1", features = [ "log" ] }
    url = "2"
    wasmtime = "46"
