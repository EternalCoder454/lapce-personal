# Vendored into Lapce Personal from https://github.com/lapce/wasi-experimental-http
# (rev 21419eb785cb583ead180f25a9685fa16de7f326) so we can keep it compiling against
# the wasmtime 14.x line. Local changes vs upstream:
#   * src/lib.rs: `add_to_linker<T>` -> `add_to_linker<T: 'static>` for wasmtime 14.0.4
#   * wasmtime/wasmtime-wasi/wasi-common: "*" -> "14" so the wildcard stops pulling
#     in wasmtime 37, which would conflict with the proxy's 14.x API usage.
[package]
    name        = "wasi-experimental-http-wasmtime"
    version     = "0.10.0"
    authors     = [ "Radu Matei <radu.matei@microsoft.com>" ]
    edition     = "2021"
    repository  = "https://github.com/deislabs/wasi-experimental-http"
    license     = "MIT"
    description = "Experimental HTTP library for WebAssembly in Wasmtime"
    readme      = "readme.md"

[dependencies]
    anyhow = "1.0"
    bytes = "1"
    futures = "0.3"
    http = "0.2"
    reqwest = { version = "0.11", default-features = true, features = [
        "json",
        "blocking",
    ] }
    thiserror = "1.0"
    tokio = { version = "1", features = [ "full" ] }
    tracing = { version = "0.1", features = [ "log" ] }
    url = "2"
    wasmtime = "14"
    wasmtime-wasi = "14"
    wasi-common = "14"
